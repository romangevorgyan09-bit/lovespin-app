name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет запустить сборку вручную кнопкой в интерфейсе GitHub на телефоне

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper
      run: |
        mkdir temp-gradle
        cd temp-gradle
        gradle wrapper --gradle-version 8.2
        cd ..
        cp -r temp-gradle/gradlew temp-gradle/gradlew.bat temp-gradle/gradle android/
        rm -rf temp-gradle
        chmod +x android/gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: LoveSpin-Dating-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
